---
name: CI

defaults:
  run:
    shell: bash

permissions:
  issues: write
  pull-requests: write
  contents: write

on:
  pull_request:
    branches:
      - master
      # Below is for staged releases, where the branch is the semantic version of the next release aka 1.0.0
      - \d+-\d+-\d+
jobs:
  python-lint-and-test:
    strategy:
      matrix:
        include:
          - python_version: "3.12"
          - python_version: "3.13"
    runs-on: ubuntu-latest
    name: "Python Syntax, Unit Tests and Linting (${{ matrix.python_version }})"

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install Poetry and dev deps
        run: |
          python -m pip install --upgrade poetry
          poetry install --no-root --with dev

      - name: Lint
        run: |
          poetry run black --check upgrade_assurance_cli

      - name: Run unit tests and coverage
        run: |
          poetry run pytest --cov upgrade_assurance_cli --cov-report=term-missing --cov-report=xml:".coverage.${{ matrix.python_version }}"

      - name: Store coverage file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-${{ matrix.python_version }}
          path: .coverage.${{ matrix.python_version }}
          # By default hidden files/folders (i.e. starting with .) are ignored.
          # You may prefer (for security reasons) not setting this and instead
          # set COVERAGE_FILE above to not start with a `.`, but you cannot
          # use "MERGE_COVERAGE_FILES: true" later on and need to manually
          # combine the coverage file using "pipx run coverage combine"
          include-hidden-files: true

  secrets-scan:
    runs-on: ubuntu-latest
    name: Secrets Scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0