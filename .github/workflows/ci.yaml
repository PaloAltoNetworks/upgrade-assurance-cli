---
name: CI

defaults:
  run:
    shell: bash

on:
  pull_request:
    branches: [master]
jobs:
  ansible-syntax:
    strategy:
      matrix:
        include:
          - python_version: "3.12"
          - python_version: "3.13"
    runs-on: ubuntu-latest
    name: Ansible Syntax Check

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install Poetry and dev deps
        run: |
          python -m pip install --upgrade poetry
          poetry install --no-root --with dev

      - name: Lint
        run: |
          black --check upgrade_assurance_cli

  secrets-scan:
    runs-on: ubuntu-latest
    name: Secrets Scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:

          fetch-depth: 0